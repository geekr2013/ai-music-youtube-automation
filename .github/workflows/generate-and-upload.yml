name: Generate and Upload AI Music Video

on:
  workflow_dispatch:
  schedule:
    # 21:23 KST. Tue / Thu / Sat.
    - cron: "23 12 * * 2,4,6"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm install

      - name: Install Kaggle CLI
        run: pip install "kaggle>=1.8.0"

      - name: Check Kaggle authentication
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "$KAGGLE_API_TOKEN" ]; then
            echo "KAGGLE_API_TOKEN is missing in GitHub Secrets."
            echo "Create a Kaggle API token and save the copied token value as KAGGLE_API_TOKEN."
            exit 1
          fi
          if ! kaggle kernels list --mine --page-size 1; then
            echo "Kaggle authentication failed. Regenerate a Kaggle API token and update GitHub Secret KAGGLE_API_TOKEN."
            exit 1
          fi

      - name: Prepare Kaggle generation kernel
        env:
          KAGGLE_GENERATION_KERNEL_SLUG: ${{ vars.KAGGLE_GENERATION_KERNEL_SLUG || vars.KAGGLE_KERNEL_SLUG }}
        run: npm run prepare:kaggle:generation

      - name: Generate music video in Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: kaggle kernels push -p kaggle

      - name: Wait for Kaggle generation
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_GENERATION_KERNEL_SLUG: ${{ vars.KAGGLE_GENERATION_KERNEL_SLUG || vars.KAGGLE_KERNEL_SLUG }}
        run: |
          for i in {1..60}; do
            status=$(kaggle kernels status "$KAGGLE_GENERATION_KERNEL_SLUG" 2>&1 || true)
            echo "$status"
            if echo "$status" | grep -qi "complete"; then
              exit 0
            fi
            if echo "$status" | grep -Eqi "error|failed|canceled"; then
              exit 1
            fi
            sleep 30
          done
          echo "Kaggle generation did not finish within 30 minutes."
          exit 1

      - name: Download generated assets
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_GENERATION_KERNEL_SLUG: ${{ vars.KAGGLE_GENERATION_KERNEL_SLUG || vars.KAGGLE_KERNEL_SLUG }}
        run: kaggle kernels output "$KAGGLE_GENERATION_KERNEL_SLUG" -p kaggle-output

      - name: Prepare generated upload queue
        run: npm run prepare:generated

      - name: Check upload queue
        run: npm run check:queue

      - name: Upload generated video to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DEFAULT_PRIVACY_STATUS: ${{ vars.DEFAULT_PRIVACY_STATUS || 'private' }}
          REQUIRE_SYNTHETIC_MEDIA_DISCLOSURE: ${{ vars.REQUIRE_SYNTHETIC_MEDIA_DISCLOSURE || 'true' }}
        run: npm run upload:youtube

      - name: Cleanup generated assets
        if: always()
        run: npm run cleanup:generated
