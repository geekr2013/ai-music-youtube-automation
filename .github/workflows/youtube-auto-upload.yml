name: YouTube Manual Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Prepare upload assets
        run: node scripts/prepare-upload-assets.js

      - name: Check upload queue
        run: npm run check:queue

      - name: Upload next ready video
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DEFAULT_PRIVACY_STATUS: ${{ vars.DEFAULT_PRIVACY_STATUS || 'private' }}
          REQUIRE_SYNTHETIC_MEDIA_DISCLOSURE: ${{ vars.REQUIRE_SYNTHETIC_MEDIA_DISCLOSURE || 'true' }}
        run: npm run upload:youtube
