name: Kaggle Quality Pipeline

on:
  workflow_dispatch:

jobs:
  kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install "kaggle>=1.8.0"

      - name: Check Kaggle authentication
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "$KAGGLE_API_TOKEN" ]; then
            echo "KAGGLE_API_TOKEN is missing in GitHub Secrets."
            exit 1
          fi
          kaggle kernels list --mine --page-size 1

      - name: Prepare Kaggle kernel metadata
        env:
          KAGGLE_KERNEL_SLUG: ${{ vars.KAGGLE_KERNEL_SLUG }}
        run: node scripts/prepare-kaggle-kernel.js

      - name: Push and run Kaggle notebook
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: kaggle kernels push -p kaggle

      - name: Download Kaggle outputs
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_KERNEL_SLUG: ${{ vars.KAGGLE_KERNEL_SLUG }}
        run: kaggle kernels output "$KAGGLE_KERNEL_SLUG" -p kaggle-output

      - name: Upload Kaggle outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-quality-output
          path: kaggle-output
